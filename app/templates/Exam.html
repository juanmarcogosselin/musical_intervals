<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Examen de Intervalos</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        header {
            background: #1f2933;
            color: white;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        main {
            max-width: 900px;
            margin: 2rem auto;
            background: white;
            padding: 2rem;
            border-radius: 8px;
        }

        .audio-controls {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .interval-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        button {
            padding: 0.8rem;
            font-size: 1rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }

        .interval-btn {
            background: #e5e7eb;
        }

        .interval-btn:hover {
            background: #d1d5db;
        }

        .primary {
            background: #2563eb;
            color: white;
        }

        .secondary {
            background: #6b7280;
            color: white;
        }

        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .feedback {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            margin: 1rem 0;
        }

        .score-box {
            text-align: center;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>

<header>
    <h2>Examen de Intervalos</h2>
    <a href="{% url 'home' %}" style="color:white; text-decoration:none;">
        ⬅ Volver a Home
    </a>
</header>

<main>

    {% if feedback %}
        <div class="feedback">
            {{ feedback }}

        </div>
    {% endif %}

    <!-- AUDIO (2 audios) -->
    <div class="audio-controls">

        <audio id="audio1" src="{{ nota1_audio }}"></audio>
        <audio id="audio2" src="{{ nota2_audio }}"></audio>



        <button class="primary" onclick="playInterval()" type="button">
            ▶ Reproducir
        </button>

        <button class="secondary" onclick="playInterval()" type="button">
            🔁 Repetir
        </button>
    </div>

    <!-- FORM: contestar -->
    <form method="post">
        {% csrf_token %}

        <input type="hidden" name="correct_interval_id" value="{{ correct_interval_id }}">

        <div class="interval-grid">
            {% for interval in intervals %}
                <button
                    type="submit"
                    name="answer"
                    value="{{ interval.id }}"
                    class="interval-btn">
                    {{ interval.name }}
                </button>
            {% endfor %}
        </div>
    </form>

</main>


<script>
    function playInterval() {
        const a1 = document.getElementById("audio1");
        const a2 = document.getElementById("audio2");

        // reiniciar
        a1.pause();
        a2.pause();
        a1.currentTime = 0;
        a2.currentTime = 0;

        // reproducir nota 1
        a1.play();

        // 1.5 segundos después, nota 2 (se enciman)
        setTimeout(() => {
            a2.play();
        }, 1300);
    }
</script>

</body>
</html>
