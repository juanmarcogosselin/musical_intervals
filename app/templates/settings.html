<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Interval Trainer - Settings</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
        }

        header {
            background-color: #222;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            font-weight: bold;
        }
        header nav a:hover {
        opacity: 0.8;
        }

        main {
            padding: 40px;
            max-width: 600px;
            margin: auto;
            background: white;
            margin-top: 40px;
            border-radius: 5px;
        }

        h2 {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        select, input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        button {
            margin-top: 30px;
            padding: 12px;
            width: 100%;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <h1>Configuración</h1>
    <nav>
        <a href={% url 'home' %}>Home</a>

    </nav>
</header>

<main>
    <h2>Opciones del Examen</h2>

    <form method="POST">
        {% csrf_token %}

        <label for="questions">Número de preguntas</label>
        <input type="number" id="questions" name="questions"
               min="5" max="99" value="{{ num_preguntas }}">

        <label for="direction">Dirección del intervalo</label>
        <select id="direction" name="direction">
            <option value="ascending"  {% if direccion == 'ascending'  %}selected{% endif %}>Ascendente</option>
            <option value="descending" {% if direccion == 'descending' %}selected{% endif %}>Descendente</option>
            <option value="harmonic"   {% if direccion == 'harmonic'   %}selected{% endif %}>Armónico</option>
            <option value="mixed"   {% if direccion == 'mixed'   %}selected{% endif %}>Mixto</option>
        </select>

        <button type="submit">💾 Guardar y comenzar examen</button>
    </form>
</main>

</body>
</html>
