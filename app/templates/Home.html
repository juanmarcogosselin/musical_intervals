<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Interval Trainer - Home</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #222;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        main {
            padding: 40px;
            text-align: center;
        }

        .menu {
            margin-top: 40px;
        }

        .menu button {
            padding: 15px 30px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        footer {
            margin-top: 60px;
            padding: 20px;
            text-align: center;
            background-color: #ddd;
        }
    </style>
</head>
<body>

<header>
    <h1>🎵 Interval Trainer</h1>
    <nav>

        <a href="/settings">Settings</a>
    </nav>
</header>

<main>
    <h2>Entrenamiento de Intervalos Musicales</h2>
    <p>Practica tu oído identificando intervalos dentro de una octava.</p>

    <div class="menu">
        <button onclick="location.href='/exam'">
            ▶️ Iniciar Examen
        </button>

        <button onclick="alert('Ver resultados')">
            📊 Resultados
        </button>

        {% load static %}

        <audio id="audioDo">
          <source src="{% static 'audios/DO.wav' %}" type="audio/wav">
        </audio>
        
        <button onclick="playDo()">Reproducir</button>
        
        <script>
        function playDo() {
          const audio = document.getElementById("audioDo");
          audio.currentTime = 0;
          audio.play();
        }
        </script>
        
    </div>
</main>

<footer>
    <p>Proyecto académico – Django + Audio</p>
</footer>

</body>
</html>
